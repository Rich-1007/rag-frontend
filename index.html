<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0B0F19;
            --bg-card: #111827;
            --bg-hover: #1F2937;
            --bg-input: #1F2937;
            
            --border-color: #374151;
            --border-hover: #4B5563;
            --border-focus: #6366F1;
            
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
            --text-inverse: #ffffff;
            
            --primary: #6366F1;
            --primary-hover: #4F46E5;
            
            --success: #10B981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --error: #EF4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 760px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ─── Header ─────────────────────── */
        .header {
            text-align: center;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #E0E7FF 0%, #6366F1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .header p {
            font-size: 15px;
            color: var(--text-muted);
        }

        /* ─── Cards ──────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: var(--transition);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-badge {
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            margin-left: auto;
            letter-spacing: 0.05em;
        }

        /* ─── Upload Area ────────────────── */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-md);
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(31, 41, 55, 0.3);
        }

        .upload-area:hover {
            border-color: var(--border-hover);
            background: var(--bg-hover);
        }

        .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: scale(1.01);
        }

        .upload-area.has-file {
            border-color: var(--primary);
            border-style: solid;
            background: rgba(99, 102, 241, 0.02);
        }

        .upload-icon {
            margin-bottom: 12px;
        }
        
        .upload-icon svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .upload-area:hover .upload-icon svg {
            color: var(--primary);
        }

        .upload-text {
            font-size: 15px;
            color: var(--text-main);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .upload-text span {
            color: var(--primary);
            text-decoration: none;
        }

        .file-types {
            font-size: 13px;
            color: var(--text-muted);
        }

        .file-input {
            display: none;
        }

        /* ─── Selected File ──────────────── */
        .selected-file {
            display: none;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            padding: 12px 16px;
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            animation: fadeIn 0.3s ease;
        }

        .selected-file.show {
            display: flex;
        }

        .file-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .file-name {
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .remove-btn {
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .remove-btn:hover {
            background: var(--error-bg);
            color: var(--error);
            border-color: var(--error);
        }

        /* ─── Buttons ────────────────────── */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-upload {
            background: var(--primary);
            color: var(--text-inverse);
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.2);
        }

        .btn-upload:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-upload:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* ─── Status Messages ────────────── */
        .status {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            animation: fadeIn 0.3s ease;
        }

        .status.show {
            display: flex;
        }

        .status.loading {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #818CF8;
        }

        .status.success {
            background: var(--success-bg);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status.error {
            background: var(--error-bg);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-right-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Ask Section ────────────────── */
        .ask-section {
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.4s ease;
            position: relative;
        }

        .ask-section.enabled {
            opacity: 1;
            pointer-events: all;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .question-input {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
        }

        .question-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .question-input::placeholder {
            color: var(--border-hover);
        }

        .btn-send {
            padding: 14px 24px;
            background: var(--success);
            color: var(--text-inverse);
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-send:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-send:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* ─── Chat Messages ──────────────── */
        .chat-area {
            margin-top: 24px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Minimal Scrollbar */
        .chat-area::-webkit-scrollbar {
            width: 6px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        .chat-area::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }

        .message {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            background: var(--primary);
            color: var(--text-inverse);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.15);
        }

        .message.bot {
            background: var(--bg-body);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message .label {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message.user .label {
            color: #C7D2FE;
        }

        .message.bot .label {
            color: var(--success);
        }

        .message .sources {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
        }
        
        .message.bot .sources {
            border-top: 1px solid var(--border-color);
        }

        /* ─── Disabled overlay text ──────── */
        .lock-message {
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 24px;
            padding: 16px;
            background: var(--bg-body);
            border-radius: var(--radius-md);
            border: 1px dashed var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ─── Responsive ─────────────────── */
        @media (max-width: 600px) {
            body {
                padding: 20px 16px;
            }
            .card {
                padding: 20px;
            }
            .upload-area {
                padding: 32px 16px;
            }
            .input-group {
                flex-direction: column;
            }
            .btn-send {
                width: 100%;
                justify-content: center;
            }
            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="10" rx="2" />
                <circle cx="12" cy="5" r="2" />
                <path d="M12 7v4" />
                <line x1="8" y1="16" x2="8" y2="16" />
                <line x1="16" y1="16" x2="16" y2="16" />
            </svg>
            RAG Agent
        </h1>
        <p>Upload a document, then chat with its contents instantly</p>
    </div>

    <div class="card">
        <div class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            Upload Document
            <span class="step-badge">STEP 1</span>
        </div>

        <div class="upload-area" id="dropZone" onclick="fileInput.click()">
            <div class="upload-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </div>
            <div class="upload-text">
                Drag & drop your file here or <span>browse</span>
            </div>
            <div class="file-types">Supports PDF and TXT files</div>
        </div>

        <input type="file" class="file-input" id="fileInput" accept=".pdf,.txt">

        <div class="selected-file" id="selectedFile">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                <polyline points="13 2 13 9 20 9"></polyline>
            </svg>
            <div class="file-info">
                <span class="file-name" id="fileName"></span>
                <span class="file-size" id="fileSize"></span>
            </div>
            <button class="remove-btn" onclick="removeFile()" title="Remove file">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <button class="btn btn-upload" id="uploadBtn" onclick="uploadFile()" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            Upload & Process
        </button>

        <div class="status" id="uploadStatus">
            <div class="spinner" id="uploadSpinner"></div>
            <span id="uploadStatusText"></span>
        </div>
    </div>

    <div class="card ask-section" id="askSection">
        <div class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            Ask Questions
            <span class="step-badge">STEP 2</span>
        </div>

        <div class="input-group">
            <input
                type="text"
                class="question-input"
                id="questionInput"
                placeholder="Ask anything about your document..."
                onkeydown="if(event.key==='Enter') askQuestion()"
            >
            <button class="btn-send" id="askBtn" onclick="askQuestion()">
                Ask 
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>

        <div class="status" id="askStatus">
            <div class="spinner" id="askSpinner"></div>
            <span id="askStatusText"></span>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="lock-message" id="lockMessage">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Upload a document first to unlock chat
        </div>
    </div>

</div>

<script>
    // ═══════════════════════════════════════
    // Configuration
    // ═══════════════════════════════════════
    const API_BASE = "https://rag-backend-w85x.onrender.com";

    // ═══════════════════════════════════════
    // DOM Elements
    // ═══════════════════════════════════════
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const selectedFile = document.getElementById("selectedFile");
    const fileName = document.getElementById("fileName");
    const fileSize = document.getElementById("fileSize");
    const uploadBtn = document.getElementById("uploadBtn");
    const uploadStatus = document.getElementById("uploadStatus");
    const uploadSpinner = document.getElementById("uploadSpinner");
    const uploadStatusText = document.getElementById("uploadStatusText");
    const askSection = document.getElementById("askSection");
    const questionInput = document.getElementById("questionInput");
    const askBtn = document.getElementById("askBtn");
    const askStatus = document.getElementById("askStatus");
    const askSpinner = document.getElementById("askSpinner");
    const askStatusText = document.getElementById("askStatusText");
    const chatArea = document.getElementById("chatArea");
    const lockMessage = document.getElementById("lockMessage");

    let currentFile = null;

    // ═══════════════════════════════════════
    // Drag & Drop
    // ═══════════════════════════════════════
    dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file) handleFileSelect(file);
    });

    fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) handleFileSelect(file);
    });

    // ═══════════════════════════════════════
    // File Selection
    // ═══════════════════════════════════════
    function handleFileSelect(file) {
        const allowed = [".pdf", ".txt"];
        const ext = "." + file.name.split(".").pop().toLowerCase();

        if (!allowed.includes(ext)) {
            showUploadStatus("error", "Only PDF and TXT files are supported");
            return;
        }

        currentFile = file;
        fileName.textContent = file.name;
        fileSize.textContent = formatFileSize(file.size);
        selectedFile.classList.add("show");
        dropZone.classList.add("has-file");
        uploadBtn.disabled = false;

        // Hide any previous status
        uploadStatus.classList.remove("show");
    }

    function removeFile() {
        currentFile = null;
        fileInput.value = "";
        selectedFile.classList.remove("show");
        dropZone.classList.remove("has-file");
        uploadBtn.disabled = true;
        uploadStatus.classList.remove("show");
    }

    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / 1048576).toFixed(1) + " MB";
    }

    // ═══════════════════════════════════════
    // Upload File
    // ═══════════════════════════════════════
    async function uploadFile() {
        if (!currentFile) return;

        // Disable button, show loading
        uploadBtn.disabled = true;
        uploadBtn.innerHTML = `
            <div class="spinner"></div> Processing...
        `;
        showUploadStatus("loading", "Extracting and chunking document... Please wait.");

        const formData = new FormData();
        formData.append("file", currentFile);

        try {
            const response = await fetch(`${API_BASE}/upload`, {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (response.ok) {
                const chunks = data.details?.chunks || "?";
                const chars = data.details?.characters || "?";
                showUploadStatus(
                    "success",
                    `Success! Extracted ${chars.toLocaleString()} characters into ${chunks} chunks.`
                );
                enableAskSection();
            } else {
                showUploadStatus("error", `Error: ${data.error}`);
                uploadBtn.disabled = false;
            }
        } catch (err) {
            showUploadStatus("error", `Connection failed. Is the server running on ${API_BASE}?`);
            uploadBtn.disabled = false;
        }

        uploadBtn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg> Upload & Process
        `;
    }

    // ═══════════════════════════════════════
    // Ask Question
    // ═══════════════════════════════════════
    async function askQuestion() {
        const query = questionInput.value.trim();
        if (!query) return;

        // Add user message to chat
        addMessage("user", query);
        questionInput.value = "";

        // Disable input while processing
        askBtn.disabled = true;
        questionInput.disabled = true;
        showAskStatus("loading", "Agent is analyzing context...");

        try {
            const response = await fetch(`${API_BASE}/ask`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: query, top_k: 5 })
            });

            const data = await response.json();

            if (response.ok) {
                const sources = data.sources?.join(", ") || "Unknown";
                const chunksUsed = data.chunks_used || 0;
                addMessage("bot", data.answer, `Sources: ${sources} | Chunks analyzed: ${chunksUsed}`);
                hideAskStatus();
            } else {
                addMessage("bot", `Encountered an error: ${data.error}`);
                showAskStatus("error", `Error: ${data.error}`);
            }
        } catch (err) {
            addMessage("bot", "Network connection failed. Please ensure the server is active.");
            showAskStatus("error", "Connection failed.");
        }

        // Re-enable input
        askBtn.disabled = false;
        questionInput.disabled = false;
        questionInput.focus();
    }

    // ═══════════════════════════════════════
    // Chat Messages
    // ═══════════════════════════════════════
    function addMessage(type, text, sourcesText = null) {
        const msg = document.createElement("div");
        msg.className = `message ${type}`;

        const label = document.createElement("div");
        label.className = "label";
        
        // Add minimal SVG icon to labels
        if (type === "user") {
            label.innerHTML = `
                YOU
            `;
        } else {
            label.innerHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="10" rx="2" />
                    <circle cx="12" cy="5" r="2" />
                    <path d="M12 7v4" />
                </svg>
                AGENT
            `;
        }
        
        msg.appendChild(label);

        const content = document.createElement("div");
        content.textContent = text;
        msg.appendChild(content);

        if (sourcesText) {
            const sources = document.createElement("div");
            sources.className = "sources";
            sources.textContent = sourcesText;
            msg.appendChild(sources);
        }

        chatArea.appendChild(msg);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // ═══════════════════════════════════════
    // Status Helpers
    // ═══════════════════════════════════════
    function showUploadStatus(type, message) {
        uploadStatus.className = `status show ${type}`;
        uploadSpinner.style.display = type === "loading" ? "block" : "none";
        uploadStatusText.textContent = message;
    }

    function showAskStatus(type, message) {
        askStatus.className = `status show ${type}`;
        askSpinner.style.display = type === "loading" ? "block" : "none";
        askStatusText.textContent = message;
    }

    function hideAskStatus() {
        askStatus.classList.remove("show");
    }

    function enableAskSection() {
        askSection.classList.add("enabled");
        lockMessage.style.display = "none";
        questionInput.focus();
    }
</script>

</body>
</html>
